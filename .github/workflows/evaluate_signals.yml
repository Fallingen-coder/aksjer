name: Selvevaluering av signaler

on:
  schedule:
    - cron: "0 17 * * 0"   # Søndag kl 18:00/19:00 norsk tid
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Evaluer signaler og oppdater kunnskapsbase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python evaluate_signals.py

      - name: Kjør backtest med parametergrid
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backtest.py --report

      - name: Commit oppdatert kunnskapsbase og backtest-rapport
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading_knowledge.md backtest_report.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto: ukentlig signalevaluering og backtest"
            git push
          else
            echo "Ingen endringer."
          fi
